<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir SQLite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #f5f7fa;
            padding: 20px;
        }
        .upload-container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .drop-zone {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s ease;
            background: #fafafa;
            cursor: pointer;
        }
        .drop-zone:hover {
            border-color: #007bff;
            background: #f0f7ff;
        }
        .drop-zone.dragover {
            border-color: #007bff;
            background: #e3f2fd;
        }
        .btn-upload {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn-upload:hover {
            transform: scale(1.05);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="upload-container">
            <h1 class="text-center mb-4">
                <i class="fas fa-database text-primary"></i>
                Subir Base de Datos SQLite
            </h1>
            <p class="text-muted text-center">Sube un archivo .db para visualizarlo en la aplicación</p>
            
            {% if error %}
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endif %}
            
            {% if success %}
            <div class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="fas fa-check-circle"></i> {{ mensaje }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                <br>
                <a href="/visualizar_sqlite" class="btn btn-success mt-2">
                    <i class="fas fa-eye"></i> Ver datos
                </a>
            </div>
            {% endif %}
            
            <form method="POST" enctype="multipart/form-data" id="uploadForm">
                <div class="drop-zone" id="dropZone">
                    <div class="mb-3">
                        <i class="fas fa-file-database" style="font-size: 48px; color: #28a745;"></i>
                        <h5 class="mt-3">Arrastra tu archivo .db aquí o haz clic para seleccionar</h5>
                        <p class="text-muted">Soporta archivos SQLite (.db)</p>
                    </div>
                    <input type="file" name="file" id="fileInput" class="form-control" accept=".db" style="display: none;">
                    <button type="button" class="btn btn-upload" onclick="document.getElementById('fileInput').click()">
                        <i class="fas fa-folder-open"></i> Seleccionar archivo
                    </button>
                    <span id="fileName" class="ms-3 text-success"></span>
                </div>
                
                <div class="text-center mt-3">
                    <button type="submit" class="btn btn-primary btn-lg" id="uploadBtn" disabled>
                        <i class="fas fa-upload"></i> Subir base de datos
                    </button>
                </div>
            </form>
            
            <div class="text-center mt-3">
                <a href="/visualizar_sqlite" class="btn btn-outline-secondary">
                    <i class="fas fa-eye"></i> Ver base de datos actual
                </a>
                <a href="/" class="btn btn-outline-primary">
                    <i class="fas fa-home"></i> Inicio
                </a>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const uploadBtn = document.getElementById('uploadBtn');
        
        dropZone.addEventListener('click', function() {
            fileInput.click();
        });
        
        dropZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            this.classList.add('dragover');
        });
        
        dropZone.addEventListener('dragleave', function(e) {
            e.preventDefault();
            this.classList.remove('dragover');
        });
        
        dropZone.addEventListener('drop', function(e) {
            e.preventDefault();
            this.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length) {
                fileInput.files = files;
                handleFileSelect(files[0]);
            }
        });
        
        fileInput.addEventListener('change', function() {
            if (this.files.length) {
                handleFileSelect(this.files[0]);
            }
        });
        
        function handleFileSelect(file) {
            if (!file.name.toLowerCase().endsWith('.db')) {
                alert('❌ Por favor, selecciona un archivo SQLite válido (.db)');
                fileInput.value = '';
                fileName.textContent = '';
                uploadBtn.disabled = true;
                return;
            }
            
            fileName.textContent = `✅ ${file.name} (${(file.size / 1024).toFixed(2)} KB)`;
            uploadBtn.disabled = false;
        }
    </script>
</body>
</html>
